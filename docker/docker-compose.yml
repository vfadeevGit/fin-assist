name: finassist-project

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres:/var/lib/postgresql/data

  finassist:
    platform: linux/amd64
    image: ${APP_IMAGE}:${APP_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_VENDOR: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS}
    volumes:
      - storage:/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - finassist
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    command: >-
      /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/custom/finassist.conf.template > /etc/nginx/conf.d/default.conf &&
      exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx/templates/finassist.conf.template:/etc/nginx/custom/finassist.conf.template:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      - nginx
    command: >-
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  postgres: {}
  storage: {}
  letsencrypt: {}
  certbot-www: {}
