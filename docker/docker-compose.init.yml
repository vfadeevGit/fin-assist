services:
  nginx:
    command: >-
      /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/custom/finassist-init.conf.template > /etc/nginx/conf.d/default.conf &&
      exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx/templates/finassist-init.conf.template:/etc/nginx/custom/finassist-init.conf.template:ro
